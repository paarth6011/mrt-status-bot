name: MRT Monitor

on:
  schedule:
    # Runs every 5 minutes during peak hours (7 AM - 10 AM & 5 PM - 8 PM SGT)
    - cron: '*/5 23,0-2,9-12 * * *'
    # Runs every 15 minutes during regular hours (6 AM - 11 PM SGT excluding peaks)
    - cron: '*/15 22,3-8,13-15 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Restore alert cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .alert_cache
          key: alert-${{ github.run_id }}
          restore-keys: |
            alert-

      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BRIDGE_URL: ${{ secrets.BRIDGE_URL }}
          LTA_KEY: ${{ secrets.LTA_KEY }}
        run: python mrt_bot.py
