name: MRT Monitor

on:
  schedule:
    # Runs every 5 minutes during peak hours (7 AM - 10 AM & 5 PM - 8 PM SGT)
    - cron: '*/5 23,0-1,9-11 * * *'
    # Runs every 15 minutes during regular hours (6 AM - 11 PM SGT excluding peaks)
    - cron: '15,30,45 22,2-8,12-15 * * *'
  workflow_dispatch: # Allows you to still run it manually

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BRIDGE_URL: ${{ secrets.BRIDGE_URL }} # <-- ADD THIS LINE
        run: python mrt_bot.py
