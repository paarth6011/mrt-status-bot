name: MRT Monitor

on:
  schedule:
    # Runs every 5 minutes during peak hours (7 AM - 10 AM & 5 PM - 8 PM SGT)
    - cron: '*/5 23,0-2,9-12 * * *'
    # Runs every 15 minutes during regular hours (6 AM - 11 PM SGT excluding peaks)
    - cron: '*/15 22,3-8,13-15 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Restore alert cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: .alert_cache
          key: alert-${{ github.run_id }}
          restore-keys: |
            alert-

      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BRIDGE_URL: ${{ secrets.BRIDGE_URL }}
          LTA_KEY: ${{ secrets.LTA_KEY }}
        run: python mrt_bot.py
