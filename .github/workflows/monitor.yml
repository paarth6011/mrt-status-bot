name: MRT Monitor

on:
  schedule:
    # Runs every 15 minutes during peak Singapore hours (6 AM - 11 PM SGT)
    # Note: GitHub uses UTC time. SGT is UTC+8.
    - cron: '0,15,30,45 22-23,0-15 * * *'
  workflow_dispatch: # Allows you to still run it manually

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python mrt_bot.py
