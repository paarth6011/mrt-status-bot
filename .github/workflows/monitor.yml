name: MRT Monitor

on:
  schedule:
    # 23:00 UTC is exactly 07:00 AM SGT (Singapore Time)
    - cron: '0 23 * * *'       # Runs exactly at 7:00 AM SGT for the summary
    
    # Standard monitoring throughout the day every 10 minutes
    # 23:10 UTC to 16:00 UTC (07:10 AM to 12:00 AM SGT)
    - cron: '*/10 23 * * *'    # 7:10 AM - 7:59 AM SGT
    - cron: '*/10 0-15 * * *'  # 8:00 AM - 11:59 PM SGT
  workflow_dispatch:           # Allows you to click the 'Play' button anytime

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python mrt_bot.py
